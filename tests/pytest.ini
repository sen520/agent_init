[pytest]
testpaths = test
test_files = test_*.py
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
